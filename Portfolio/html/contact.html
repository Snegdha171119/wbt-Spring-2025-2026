<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snegdha's Portfolio - Contact</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header>
        <h1>Contact Me</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="education.html">Education</a></li>
                <li><a href="experience.html">Experience</a></li>
                <li><a href="project.html">Project</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-form">
            <form method="post" action="#">

                <fieldset>
                    <legend>Contact Form</legend>

                    <!-- Name -->
                    <div>
                        <label for="firstname">First Name:</label>
                        <input type="text" id="firstname" name="firstname" placeholder="Enter your first name" required>
                    </div>

                    <div>
                        <label for="lastname">Last Name:</label>
                        <input type="text" id="lastname" name="lastname" placeholder="Enter your last name" required>
                    </div>

                    <!-- Gender -->
                    <div>
                        <span>Gender:</span>
                        <input type="radio" id="male" name="gender" value="male" required>
                        <label for="male">Male</label>
                        <input type="radio" id="female" name="gender" value="female">
                        <label for="female">Female</label>
                    </div>

                    <!-- Email -->
                    <div>
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <!-- Company -->
                    <div>
                        <label for="company">Company:</label>
                        <input type="text" id="company" name="company" placeholder="Enter your company name">
                    </div>

                    <!-- Reason of Contact -->
                    <div>
                        <span>Reason of Contact:</span>
                        <input type="radio" id="project" name="reason_of_contact" value="project" required>
                        <label for="project">Project</label>
                        <input type="radio" id="thesis" name="reason_of_contact" value="thesis">
                        <label for="thesis">Thesis</label>
                        <input type="radio" id="job" name="reason_of_contact" value="job">
                        <label for="job">Job</label>
                    </div>

                    <!-- Topics -->
                    <div>
                        <span>Topics:</span>
                        <input type="checkbox" id="web" name="topics" value="web development" required>
                        <label for="web">Web Development</label>
                        <input type="checkbox" id="mobile" name="topics" value="mobile development">
                        <label for="mobile">Mobile Development</label>
                        <input type="checkbox" id="ai" name="topics" value="ai/ml development">
                        <label for="ai">AI/ML Development</label>
                    </div>

                    <!-- Consultation Date -->
                    <div>
                        <label for="consultation_date">Consultation Date:</label>
                        <input type="date" id="consultation_date" name="consultation_date" required>
                    </div>

                    <!-- Submit & Reset -->
                    <div>
                        <input type="submit" value="Register">
                        <input type="reset" value="Reset">
                    </div>

                </fieldset>
            </form>
        </section>
    </main>

    <footer>
        <a href="../index.html">Back to Home</a>
    </footer>

</body>
</html>
