<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assessment</title>
    <link rel="stylesheet" href="form.css">
</head>
 
<section>
    <form action="#" method="post">
       
            <legend>Donor Information</legend>
 
            <table>
 
                <tr>
                    <td class="label"><label for="fname">First Name <span>*</span></label></td>
                    <td><input type="text" id="fname" name="fname" required></td>
                </tr>
 
                <tr>
                    <td class="label" ><label for="lname">Last Name <span>*</span></label></td>
                    <td><input type="text" id="lname" name="lname" required></td>
                </tr>
 
                <tr>
                    <td class="label"><label for="company">Company<span>*</span></label></td>
                    <td><input type="text" id="company" name="company"></td>
                </tr>
 
                <tr>
                    <td class="label"><label for="address1">Address 1<span>*</span></label></td>
                    <td><input type="text" id="address1" name="address1" required></td>
                </tr>
 
                <tr>
                    <td class="label"><label for="address2">Address 2<span>*</span></label></td>
                    <td><input type="text" id="address2" name="address2"></td>
                </tr>
 
                 <tr>
                    <td class="label"><label for="city">City<span>*</span></label></td>
                    <td><input type="text" id="city" name="city" required></td>
                </tr>
 
                <tr>
                    <td class="label"><label for="state">State<span>*</span></label></td>
                    <td>
                        <select id="state" name="state">
                            <option>Select a State</option>
                        </select>
                    </td>
                </tr>
 
                <tr>
                    <td class="label"><label for="zip">Zip Code<span>*</span></label></td>
                    <td><input type="text" id="zip" name="zip" required></td>
                </tr>
 
                 <tr>
                    <td class="label"><label for="country">Country<span>*</span></label></td>
                    <td>
                        <select id="country" name="country">
                            <option>Select a Country</option>
                            <option>Bangladesh</option>
                        </select>
                    </td>
                </tr>
 
                <tr>
                    <td class="label"><label for="phone">Phone<span>*</span></label></td>
                    <td><input type="tel" id="phone" name="phone"></td>
                </tr>
 
                <tr>
                    <td class="label"><label for="fax">Fax<span>*</span></label></td>
                    <td><input type="text" id="fax" name="fax"></td>
                </tr>
 
                <tr>
                    <td class="label"><label for="email">Email<span>*</span></label></td>
                    <td><input type="email" id="email" name="email" required></td>
                </tr>
 
                <tr>
                    <td class="label"><label>Donation Amount <span>*</span></label></td>
                    <td>
                        <input type="radio" name="amount" value="none" required> None
                        <input type="radio" name="amount" value="50">$50
                        <input type="radio" name="amount" value="75">$75
                        <input type="radio" name="amount" value="100">$100
                        <input type="radio" name="amount" value="250">$250
                        <input type="radio" name="amount" value="other"> Other
                    </td>
                </tr>
 
                <tr>
                    <td>(Check a button or type in your <br>amount) </br></td>
                    <td class="label"><label for="other">Other Amount $</label>
                    <input type="number" id="other" name="other">
                    </td>  
                </tr>
 
                <tr>
                    <td class="label"><label>Recurring Donation:</label>
                    <br>(Check if yes) </br></td>
                    <td>
                        <input type="checkbox" name="recurring">
                        I am interested in giving on a regular basis.
                    </td>
                </tr>
 
               
                <tr>
                    <td></td>
                    <td>
                        Monthly Credit Card $
                        <input type="number" name="monthly_amount" style="width:80px;">
                        For
                        <input type="number" name="months" style="width:60px;"> Months
                    </td>
                </tr>
 
                 <tr>
                            <td></td>
                            <td>
                                <input type="submit" value="Submit">
                                <input type="reset" value="Reset">
                            </td>
                        </tr>
                    </table>
            </form>
        </section>
    </main>
